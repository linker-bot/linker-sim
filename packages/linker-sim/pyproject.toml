[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "linker-sim"
version = "0.1.0"
description = "Multi-robot, multi-sim RL simulation backbone (Isaac Sim + MuJoCo)."
readme = "README.md"
requires-python = ">=3.11,<3.13"
# Runtime: registry resolves the bundled asset tree via
# linker_robot_assets.asset_root(). Workflows (tools / mujoco / isaac)
# install their own subsets — see [project.optional-dependencies]. A
# CI runner that only validates asset composition needs `[tools]` from
# linker-robot-assets directly, nothing more.
dependencies = [
    "linker-robot-assets",
]

[tool.uv.sources]
# Resolve linker-robot-assets from the workspace rather than PyPI when
# this package is installed inside the workspace.
linker-robot-assets = { workspace = true }

[project.optional-dependencies]
# Composer, validator, registry CLI. Stdlib + pyyaml. Safe on any Python
# 3.11 env without a GPU. Hydra is included here because `scripts/run.py`
# imports it on the happy-path and it's pure Python.
tools = [
    "pyyaml>=6.0",
    "hydra-core>=1.3",
]

# MJCF authoring + validation. Pulls MuJoCo on top of [tools].
# torch is required at runtime by linker_sim/runtime/replay.py and the
# backends (linker_sim/backends/{base,mujoco/backend}.py) — keep this in
# sync with the isaac extra, which gets torch transitively via isaacsim.
mujoco = [
    "linker-sim[tools]",
    "mujoco>=3.1",
    "torch>=2.0",
]

# Isaac Sim 5 + IsaacLab extensions. Isaac Sim wheels come from NVIDIA's
# pypi index (see [[tool.uv.index]] at the workspace root). IsaacLab's own
# extensions (isaaclab, isaaclab_assets, ...) are installed separately via
# `./isaaclab.sh -i` from the IsaacLab clone — see docs/installation.md.
isaac = [
    "linker-sim[tools]",
    # IsaacLab v2.3.2 requires Isaac Sim 5.1 (it pins
    # isaacsim.asset.importer.urdf==2.4.31, which ships with 5.1 — not 5.0).
    # See docs/installation.md troubleshooting for the symptom.
    "isaacsim[all,extscache]==5.1.0.0",
    # flatdict 4.0.1 lacks a pkg_resources build dep declaration and
    # modern setuptools no longer exposes it implicitly. Pinned here;
    # install with `--no-build-isolation` per docs/installation.md.
    "flatdict==4.0.1",
]

# LeRobot-compatible parquet sink (linker_sim.io.recorder.LeRobotSink).
# Opt-in because pyarrow is heavy and not needed for JSONL recording.
lerobot = [
    "linker-sim[tools]",
    "pyarrow>=14.0",
]

# Viser backend — browser-based replay viewer. Replay-only for now (Phase 3
# of docs/REFACTOR_PLAN.md); teleop deferred. yourdfpy is required by
# viser.extras.ViserUrdf and is NOT pulled by viser itself; numpy and
# trimesh come transitively via viser/yourdfpy. torch is needed at runtime
# because the Robot/SimBackend protocols are torch-typed (joint_pos and
# friends are torch tensors), same as the [mujoco] / [isaac] extras.
viser = [
    "linker-sim[tools]",
    "viser>=0.2",
    "yourdfpy>=0.0.56",
    "torch>=2.0",
]

dev = [
    "ruff>=0.6",
    "pytest>=8.0",
    # The pytest gate documented in docs/USAGE.md imports torch
    # unconditionally from several test files. Keep this in sync with
    # the runtime extras above.
    "torch>=2.0",
]

# Convenience: everything except dev tools.
all = [
    "linker-sim[tools,mujoco,isaac,lerobot]",
]

# ----------------------------- hatch packaging ---------------------------- #

[tool.hatch.build.targets.wheel]
packages = ["src/linker_sim"]
