# Linker-Hand-flavored real-robot recording. `path` points at a directory
# containing `telemetry.npz`. Default points at a tiny synthetic fixture
# committed to the repo (`tests/fixtures/data_collection/`) so a fresh
# clone runs `scripts/replay.py source=data_collection` end-to-end
# without external data. For real recordings, override on the CLI:
# `source.path=/abs/or/relative/path`.
# Telemetry layout (verified empirically): qpos cols 0-13 are the two
# arms in radians; cols 14-25 are 0-255 byte commands per finger for the
# two hands. Decoder=linker_o6 maps bytes -> joint range (same linear
# math as linker_l6; the source hardware was L6 but the math applies
# identically to the O6 default workstation).
_target_: linker_sim.io.replay.sources.TelemetryNpzSource
path: tests/fixtures/data_collection
field: qpos        # qpos | actions | effort | qvel
hz: 30.0
layout:
  arm_left:
    cols: [0, 7]
    sign: 1.0
  arm_right:
    cols: [7, 14]
    sign: 1.0
  hand_left:
    cols: [14, 20]
    decoder: linker_o6
  hand_right:
    cols: [20, 26]
    decoder: linker_o6
