# @package _global_
task:
  _target_: linker_sim.tasks.bimanual_reach.BimanualReachTask
  cfg:
    _target_: linker_sim.tasks.bimanual_reach.BimanualReachTaskCfg
    robot_name: ${robot.role_name}
    arms:
      - _target_: linker_sim.tasks.bimanual_reach.ArmSpec
        role: arm_left
        ee_frame: "arm_left:tool0"
        workspace_lo: [0.20, 0.05, 0.15]
        workspace_hi: [0.55, 0.35, 0.55]
        orientation_range: [0.0, 0.0, 0.0]
      - _target_: linker_sim.tasks.bimanual_reach.ArmSpec
        role: arm_right
        ee_frame: "arm_right:tool0"
        workspace_lo: [0.20, -0.35, 0.15]
        workspace_hi: [0.55, -0.05, 0.55]
        orientation_range: [0.0, 0.0, 0.0]
    pos_weight: 2.0
    ori_weight: 0.5
    action_penalty: 0.01
    joint_vel_penalty: 0.001
    success_pos_threshold: 0.02
    success_ori_threshold_rad: 0.1745
    success_hold_steps: 5
    # Paired with controller=ik_pose_bimanual: 7 + 6 + 7 + 6 = 26.
    action_dim: 26
