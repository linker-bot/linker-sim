schema_version: 1
convention: linear-fit-v0

# SDK channel index -> templated actuated-joint name. {S} expands to
# `l` (left) or `r` (right) per side. L6 hardware packs the two thumb
# DoFs as (cmc_pitch, cmc_roll) — the opposite of the URDF <joint>
# declaration order that drives manifest.yaml. `TelemetryNpzSource`
# permutes raw columns into manifest order using this list, so the
# two files are decoupled: URDF stays the physical description, this
# file stays the SDK data protocol.
channels:
  - "{S}h_thumb_cmc_pitch"
  - "{S}h_thumb_cmc_roll"
  - "{S}h_index_mcp_pitch"
  - "{S}h_middle_mcp_pitch"
  - "{S}h_ring_mcp_pitch"
  - "{S}h_pinky_mcp_pitch"

# Optional: per-joint [lower, upper] clip override. Empty when URDF
# limits are the SDK-trusted range.
clip_overrides: {}
