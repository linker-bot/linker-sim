schema_version: 1
convention: linear-fit-v0

# SDK channel index -> templated actuated-joint name. {S} expands to
# `l` (left) or `r` (right) per side; matches meta.yaml's convention.
# Mirrors meta.yaml:actuated_joints exactly — keep in sync if either
# changes. See packages/linker-robot-assets/src/linker_robot_assets/decoders/hand.py
# for the linear-interp math and docs/known_limitations.md for the
# placeholder caveat.
channels:
  - "{S}h_thumb_cmc_roll"
  - "{S}h_thumb_cmc_pitch"
  - "{S}h_index_mcp_pitch"
  - "{S}h_middle_mcp_pitch"
  - "{S}h_ring_mcp_pitch"
  - "{S}h_pinky_mcp_pitch"

# Optional: per-joint [lower, upper] clip override. Empty when URDF
# limits are the SDK-trusted range.
clip_overrides: {}
