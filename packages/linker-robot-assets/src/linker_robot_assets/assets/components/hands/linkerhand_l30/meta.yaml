schema_version: 1
kind: hand
name: linkerhand_l30
drive: position

# L/R variants share structure but ship pre-mirrored meshes. The {S}
# placeholder expands to `l` or `r` to form the joint-name prefix
# (lh_*, rh_*) used in each variant's URDF.
variants:
  left:
    vars: {S: l}
    urdf: variants/left/hand.urdf
    mjcf: variants/left/hand.mjcf
    meshdir: variants/left/meshes
  right:
    vars: {S: r}
    urdf: variants/right/hand.urdf
    mjcf: variants/right/hand.mjcf
    meshdir: variants/right/meshes

root_link: "{S}h_hand_base_link"

mount_frames:
  wrist_mount:
    parent: "{S}h_hand_base_link"

# 17 independently-driven joints + 4 mimic joints. L30 carries an extra
# wrist-pitch DoF below the hand base (driving a `wrist_carpal_link0`
# carpal that hosts all five finger/thumb chains). The thumb has 4 active
# DoF (cmc_yaw, cmc_roll, mcp, dip) — note dip is independent here, unlike
# l25/l6 where it mimics. Each non-thumb finger has 3 active DoF (mcp_roll,
# mcp_pitch, pip); the *_dip joints are coupled to *_pip via URDF <mimic>
# tags (multiplier 1.0) and an MJCF <equality polycoef> block.
actuated_joints:
  - "{S}h_wrist_pitch"
  - "{S}h_thumb_cmc_yaw"
  - "{S}h_thumb_cmc_roll"
  - "{S}h_thumb_mcp"
  - "{S}h_thumb_dip"
  - "{S}h_index_mcp_roll"
  - "{S}h_index_mcp_pitch"
  - "{S}h_index_pip"
  - "{S}h_middle_mcp_roll"
  - "{S}h_middle_mcp_pitch"
  - "{S}h_middle_pip"
  - "{S}h_ring_mcp_roll"
  - "{S}h_ring_mcp_pitch"
  - "{S}h_ring_pip"
  - "{S}h_pinky_mcp_roll"
  - "{S}h_pinky_mcp_pitch"
  - "{S}h_pinky_pip"

mimic_joints:
  - "{S}h_index_dip"
  - "{S}h_middle_dip"
  - "{S}h_ring_dip"
  - "{S}h_pinky_dip"

default_gains:
  stiffness: 200.0
  damping: 4.0

gain_profiles:
  joint:
    stiffness: 200.0
    damping: 4.0
