schema_version: 1
name: a7_lite_l20lite_dc
description: >
  Bimanual a7_lite torso + two 7-DOF a7_lite arms + two Linkerhand L20
  Lite hands (10 actuated + 10 mimic per side), all welded into a single
  articulation via the composer. Source arm URDF: vendor a7_lite arm
  package (combined LZARMzongzhuang.urdf, split into torso + per-side
  arm components and renamed L1..L7 / R1..R7). Roles arm_left /
  arm_right / hand_left / hand_right are addressable through
  Robot.joint_ids_of(role); the torso is a fixed base welded to world at
  z=1.2m.

components:
  base:
    component: bases/a7_lite_torso
    variant: default
  arm_left:
    component: arms/a7_lite
    variant: left
  arm_right:
    component: arms/a7_lite
    variant: right
  hand_left:
    component: hands/linkerhand_l20lite
    variant: left
  hand_right:
    component: hands/linkerhand_l20lite
    variant: right

freeze_base: base

# Arm mount offsets are identity. Hand mounts mirror a7_lite_o6_dc's
# quarter-turn so palms face inward.
mounts:
  - child: arm_left:base_mount
    parent: base:arm_left_mount
    xyz: [0.0, 0.0, 0.0]
    rpy: [0.0, 0.0, 0.0]
  - child: arm_right:base_mount
    parent: base:arm_right_mount
    xyz: [0.0, 0.0, 0.0]
    rpy: [0.0, 0.0, 0.0]
  - child: hand_left:wrist_mount
    parent: arm_left:tool0
    xyz: [-0.028, 0.0, -0.052]
    rpy: [3.1416, 0.0, -1.5708]
  - child: hand_right:wrist_mount
    parent: arm_right:tool0
    xyz: [-0.028, 0.0, -0.052]
    rpy: [3.1416, 0.0, 1.5708]
