schema_version: 1
name: ar5_l6_bench_right
description: AR5 arm + Linkerhand L6 (right side) mounted on the workstation bench.

components:
  base:
    component: bases/bench_table
    variant: default
  arm:
    component: arms/ar5
    variant: right
  hand:
    component: hands/linkerhand_l6
    variant: right

freeze_base: base

mounts:
  - child: arm:base_mount
    parent: base:arm_right_mount
    xyz: [0.0, 0.0, 0.0]
    rpy: [0.0, 0.0, 0.0]
  - child: hand:wrist_mount
    parent: arm:tool0
    xyz: [0.0, 0.0, 0.03]
    rpy: [0.0, 0.0, -1.5708]
