schema_version: 1
name: ar5_l6_bench
description: AR5 arm + Linkerhand L6 (left side) mounted on the workstation bench.

components:
  base:
    component: bases/bench_table
    variant: default
  arm:
    component: arms/ar5
    variant: left
  hand:
    component: hands/linkerhand_l6
    variant: left

# Weld the base to world; arm attaches to the base's left mount pad; hand
# attaches to the arm's tool0 frame with the legacy 0.03 m Z offset and
# 90° Z-rotation from the source arm_hand_fixed joint.
freeze_base: base

mounts:
  - child: arm:base_mount
    parent: base:arm_left_mount
    xyz: [0.0, 0.0, 0.0]
    rpy: [0.0, 0.0, 0.0]
  - child: hand:wrist_mount
    parent: arm:tool0
    xyz: [0.0, 0.0, 0.03]
    rpy: [0.0, 0.0, 1.5708]
