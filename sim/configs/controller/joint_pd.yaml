# @package _global_
# Joint-space PD on both roles. Used by the legacy gain tuner and for
# comparison-to-OSC experiments.
controller:
  name: joint_pd
  entries:
    - _target_: sim.controllers.joint_pd.JointPDController
      cfg:
        _target_: sim.controllers.joint_pd.JointPDControllerCfg
        role: arm
        action_scale: 0.25
    - _target_: sim.controllers.joint_pd.JointPDController
      cfg:
        _target_: sim.controllers.joint_pd.JointPDControllerCfg
        role: hand
        action_scale: 0.2
