# @package _global_
# Pick-and-place. Requires a `cube` rigid body — override robot to
# include it (see examples in docs/PR2_PROGRESS.md) or merge one in
# via hydra: `+robot.rigid_bodies.cube.size=[0.04,0.04,0.04]` etc.
task:
  _target_: sim.tasks.pick_place.PickPlaceTask
  cfg:
    _target_: sim.tasks.pick_place.PickPlaceTaskCfg
    robot_name: ${robot.role_name}
    object_name: cube
    ee_frame: "arm:tool0"
    cube_spawn_lo: [0.30, 0.10, 1.29]
    cube_spawn_hi: [0.45, 0.30, 1.29]
    target_lo: [0.30, 0.00, 1.41]
    target_hi: [0.45, 0.40, 1.51]
    reach_threshold: 0.05
    lift_threshold_z: 0.10
    place_threshold: 0.05
    reach_reward: 1.0
    lift_reward: 2.0
    place_reward: 5.0
    action_penalty: 0.01
    joint_vel_penalty: 0.001
    success_hold_steps: 10
    action_dim: 12

# Override robot group to pre-declare the cube.
robot:
  rigid_bodies:
    cube:
      _target_: sim.backends.isaac.backend.RigidBodySpec
      shape: box
      size: [0.04, 0.04, 0.04]
      mass: 0.05
      init_pos: [0.40, 0.0, 1.29]
      init_quat_wxyz: [1.0, 0.0, 0.0, 0.0]
      color: [0.8, 0.3, 0.2]
