# @package _global_
task:
  _target_: sim.tasks.reach.ReachTask
  cfg:
    _target_: sim.tasks.reach.ReachTaskCfg
    robot_name: ${robot.role_name}
    ee_frame: "arm:tool0"
    workspace_lo: [0.20, -0.25, 0.15]
    workspace_hi: [0.55, 0.25, 0.55]
    orientation_range: [0.0, 0.0, 0.0]
    pos_weight: 2.0
    ori_weight: 0.5
    action_penalty: 0.01
    joint_vel_penalty: 0.001
    success_pos_threshold: 0.02
    success_ori_threshold_rad: 0.1745
    success_hold_steps: 5
    # action_dim must match controller command_dim sum (arm 6 + hand 6 = 12).
    action_dim: 12
