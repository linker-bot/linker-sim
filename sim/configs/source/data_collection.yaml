# Linker-Hand-flavored real-robot recording. `path` points at a directory
# containing `telemetry.npz` (default: `episode_000025/` at the repo
# root). The recording is not tracked in this repo; supply your own and
# either drop it at the default path or override on the CLI with
# `source.path=/abs/or/relative/path`.
# Telemetry layout (verified empirically): qpos cols 0-13 are the two
# arms in radians; cols 14-25 are 0-255 byte commands per finger for the
# two hands. Decoder=linker_o6 maps bytes -> joint range (same linear
# math as linker_l6; the source hardware was L6 but the math applies
# identically to the O6 default workstation).
_target_: sim.io.replay.sources.TelemetryNpzSource
path: episode_000025
field: qpos        # qpos | actions | effort | qvel
hz: 30.0
layout:
  arm_left:
    cols: [0, 7]
    sign: 1.0
  arm_right:
    cols: [7, 14]
    sign: 1.0
  hand_left:
    cols: [14, 20]
    decoder: linker_o6
  hand_right:
    cols: [20, 26]
    decoder: linker_o6
